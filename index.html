<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="MoneyTracker Pro - Gestion d'argent hors ligne">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MoneyTracker">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231a1a2e' width='100' height='100'/><text y='.9em' x='50%' text-anchor='middle' fill='white' font-size='90'>💰</text></svg>">
    <title>💰 MoneyTracker Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        :root {
            --bg1: #1a1a2e;
            --bg2: #16213e;
            --card: rgba(255,255,255,0.08);
            --txt: #ffffff;
            --txt2: rgba(255,255,255,0.7);
            --gain: #00b894;
            --gainL: rgba(0,184,148,0.15);
            --dep: #e74c3c;
            --depL: rgba(231,76,60,0.15);
            --acc: #3498db;
            --accL: rgba(52,152,219,0.15);
            --warn: #f39c12;
            --warnL: rgba(243,156,18,0.15);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(145deg, var(--bg1), var(--bg2));
            color: var(--txt);
            padding-top: var(--safe-top);
        }

        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s, visibility 0.4s;
        }

        #loading.hidden {
            opacity: 0;
            visibility: hidden;
        }

        #loading .logo {
            font-size: 4rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        #loading .text {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 1rem 0;
        }

        #loading .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--card);
            border-top-color: var(--acc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #app {
            display: flex;
            flex-direction: column;
            height: calc(100vh - var(--safe-top));
            height: calc(100dvh - var(--safe-top));
        }

        .header {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header h1 {
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--card);
            border: none;
            color: var(--txt);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-btn:active {
            transform: scale(0.92);
        }

        .main {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .container {
            padding: 16px;
            max-width: 500px;
            margin: 0 auto;
        }

        .month-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            background: var(--card);
            border-radius: 14px;
            margin-bottom: 16px;
        }

        .month-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            border: none;
            color: var(--txt);
            font-size: 1rem;
            cursor: pointer;
        }

        .month-btn:active {
            transform: scale(0.9);
        }

        .month-name {
            font-weight: 600;
            min-width: 150px;
            text-align: center;
        }

        .alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert.danger {
            background: var(--depL);
            border-left: 4px solid var(--dep);
        }

        .alert.warning {
            background: var(--warnL);
            border-left: 4px solid var(--warn);
        }

        .alert.success {
            background: var(--gainL);
            border-left: 4px solid var(--gain);
        }

        .alert-icon {
            font-size: 1.4rem;
        }

        .alert-text {
            flex: 1;
        }

        .alert-text strong {
            display: block;
            margin-bottom: 2px;
        }

        .alert-text span {
            font-size: 0.85rem;
            opacity: 0.85;
        }

        .summary {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .card {
            padding: 14px;
            border-radius: 14px;
            text-align: center;
        }

        .card:active {
            transform: scale(0.97);
        }

        .card.gain {
            background: linear-gradient(135deg, var(--gain), #00a884);
        }

        .card.depense {
            background: linear-gradient(135deg, var(--dep), #c0392b);
        }

        .card.solde {
            background: linear-gradient(135deg, var(--acc), #2980b9);
            grid-column: span 2;
        }

        .card.budget {
            background: linear-gradient(135deg, var(--warn), #e67e22);
            grid-column: span 2;
        }

        .card h3 {
            font-size: 0.7rem;
            opacity: 0.9;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card .amount {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .card.solde .amount {
            font-size: 1.8rem;
        }

        .budget-section {
            background: var(--card);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .budget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .budget-header h3 {
            font-size: 0.9rem;
        }

        .budget-edit {
            background: rgba(255,255,255,0.12);
            border: none;
            color: var(--txt);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .budget-bar {
            height: 14px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .budget-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 6px;
            min-width: 40px;
        }

        .budget-fill.safe {
            background: linear-gradient(90deg, var(--gain), #00cec9);
        }

        .budget-fill.warning {
            background: linear-gradient(90deg, var(--warn), #e67e22);
        }

        .budget-fill.danger {
            background: linear-gradient(90deg, var(--dep), #e74c3c);
        }

        .budget-percent {
            font-size: 0.65rem;
            font-weight: 700;
        }

        .budget-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--txt2);
        }

        .budget-info strong {
            color: var(--txt);
        }

        .quick-add {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .quick-btn {
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .quick-btn:active {
            transform: scale(0.96);
        }

        .quick-btn.gain {
            background: linear-gradient(135deg, var(--gain), #00cec9);
        }

        .quick-btn.depense {
            background: linear-gradient(135deg, var(--dep), #c0392b);
        }

        .section {
            background: var(--card);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-header h2 {
            font-size: 0.95rem;
        }

        .see-all {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--txt);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .category {
            background: rgba(255,255,255,0.05);
            padding: 10px 4px;
            border-radius: 10px;
            text-align: center;
        }

        .category:active {
            transform: scale(0.95);
        }

        .category .icon {
            font-size: 1.3rem;
            margin-bottom: 4px;
            display: block;
        }

        .category .name {
            font-size: 0.55rem;
            color: var(--txt2);
            margin-bottom: 2px;
        }

        .category .amount {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--dep);
        }

        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .chip {
            padding: 7px 14px;
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 18px;
            color: var(--txt);
            font-size: 0.8rem;
            white-space: nowrap;
            cursor: pointer;
        }

        .chip.active {
            background: var(--acc);
        }

        .chip:active:not(.active) {
            background: rgba(255,255,255,0.15);
        }

        .transaction-list {
            max-height: 350px;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            margin-bottom: 6px;
        }

        .transaction-item:active {
            background: rgba(255,255,255,0.08);
        }

        .transaction-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .transaction-icon.gain {
            background: var(--gainL);
        }

        .transaction-icon.depense {
            background: var(--depL);
        }

        .transaction-info {
            flex: 1;
            min-width: 0;
        }

        .transaction-info h4 {
            font-size: 0.9rem;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .transaction-meta {
            font-size: 0.7rem;
            color: var(--txt2);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .transaction-meta .category {
            background: rgba(255,255,255,0.1);
            padding: 1px 6px;
            border-radius: 5px;
        }

        .transaction-amount {
            font-size: 0.9rem;
            font-weight: 700;
            margin-left: 8px;
            white-space: nowrap;
        }

        .transaction-amount.gain {
            color: var(--gain);
        }

        .transaction-amount.depense {
            color: var(--dep);
        }

        .transaction-delete {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--depL);
            border: none;
            color: var(--dep);
            font-size: 0.9rem;
            margin-left: 8px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .transaction-delete:active {
            background: var(--dep);
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 14px;
        }

        .stat-item {
            background: var(--card);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-item .value {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .stat-item .value.positive {
            color: var(--gain);
        }

        .stat-item .value.negative {
            color: var(--dep);
        }

        .stat-item .label {
            font-size: 0.7rem;
            color: var(--txt2);
        }

        .chart-container {
            position: relative;
            height: 200px;
            margin: 14px 0;
        }

        .chart-bars {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 120px;
            padding: 8px 0;
        }

        .chart-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .chart-columns {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 90px;
        }

        .chart-bar {
            width: 12px;
            border-radius: 3px 3px 0 0;
            min-height: 3px;
        }

        .chart-bar.gain {
            background: var(--gain);
        }

        .chart-bar.depense {
            background: var(--dep);
        }

        .chart-label {
            font-size: 0.65rem;
            margin-top: 6px;
            color: var(--txt2);
        }

        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 10px;
            font-size: 0.75rem;
        }

        .chart-legend span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chart-legend .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .chart-legend .dot.gain {
            background: var(--gain);
        }

        .chart-legend .dot.depense {
            background: var(--dep);
        }

        .bottom-nav {
            background: rgba(22,33,62,0.97);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            padding-bottom: calc(8px + var(--safe-bottom));
            border-top: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }

        .nav-item {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 1.3rem;
            padding: 6px 16px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            position: relative;
        }

        .nav-item span {
            font-size: 0.55rem;
        }

        .nav-item.active {
            color: var(--acc);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 18px;
            height: 3px;
            background: var(--acc);
            border-radius: 2px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.25s ease;
        }

        @keyframes
